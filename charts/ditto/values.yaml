# Values for the Eclipse Ditto wrapper chart.
# This chart wraps the official eclipse/ditto OCI chart.
# All upstream values can be overridden under the `ditto:` key.

# gateway ESO integration flags
gateway:
  # useExternalSecret: when true, skip gateway-secret generation and reference an ESO-managed secret instead.
  # Set ditto.gateway.config.authentication.devops.existingSecret to the secret name.
  useExternalSecret: false
  # existingSecretName: name of the ESO-managed secret containing devopsPassword and statusPassword keys.
  # Only used when useExternalSecret is true.
  existingSecretName: ""

# dbconfig ESO integration flags
dbconfig:
  # useExternalSecret: when true, skip dbconfig secret generation and reference an ESO-managed secret instead.
  # Set ditto.dbconfig.uriSecret to the secret name.
  useExternalSecret: false
  # existingSecretName: name of the ESO-managed secret containing MongoDB connection URIs.
  # Only used when useExternalSecret is true.
  # Expected keys: connectivity, things, thingsSearch, policies (each containing a URI).
  existingSecretName: ""

# ditto: values passed through to the upstream eclipse/ditto chart.
# See https://hub.docker.com/r/eclipse/ditto for full values reference.
ditto:
  # Disable bundled MongoDB — use an external MongoDB instance
  mongodb:
    enabled: false

  # dbconfig: override URIs or point to an existing secret.
  # When dbconfig.useExternalSecret is true, set uriSecret here:
  # dbconfig:
  #   uriSecret: my-ditto-mongodb-secret

  # global.existingSecret: existing nginx htpasswd secret (for basic auth users).
  # When provided, global.basicAuthUsers is ignored.
  # global:
  #   existingSecret: my-ditto-nginx-auth-secret

  # gateway.config.authentication.devops.existingSecret:
  # When gateway.useExternalSecret is true, set this to gateway.existingSecretName.
  # gateway:
  #   config:
  #     authentication:
  #       devops:
  #         existingSecret: my-ditto-gateway-secret
